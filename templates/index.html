<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College FAQ Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="chat-bg">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">College AI Chatbot</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link">Welcome, {{ session.username }}</span>
                    </li>
                    {% if session.is_admin %}
                    <li class="nav-item">
                        <a class="nav-link" href="/admin">Admin Dashboard</a>
                    </li>
                    {% endif %}
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="chat-container card shadow-lg">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Loyola Academy AI Assistant</h5>
                    </div>
                    <div class="card-body chat-messages" id="chatMessages">
                        <div class="message bot-message">
                            <p>Hello! Welcome to Loyola Academy Degree & PG College AI Assistant! How can I help you today?</p>
                        </div>
                    </div>
                    <div class="card-footer">
                        <form id="chatForm" class="d-flex gap-2">
                            <input type="text" id="userInput" class="form-control" placeholder="Ask a question..." required>
                            <button type="submit" class="btn btn-primary">Send</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-4">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-header">
                        <h6 class="mb-0">Quick Suggestions</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-outline-primary suggestion-btn">Loyola academy admission process?</button>
                            <button class="btn btn-outline-primary suggestion-btn">Loyola academy website?</button>
                            <button class="btn btn-outline-primary suggestion-btn">Loyola academy contact details?</button>
                            <button class="btn btn-outline-primary suggestion-btn">Loyola academy location?</button>
                            <button class="btn btn-outline-primary suggestion-btn">Loyola academy courses?</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
